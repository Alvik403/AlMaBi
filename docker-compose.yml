name: dashboard-opiop

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard_web
    ports:
      - "18001:8000"
    environment:
      DEBUG: "true"
      APP_PORT: "8000"
      DATA_DIR: /app/data
      UPLOADS_DIR: /app/uploads
      DATABASE_PATH: /app/runtime/dashboard.sqlite3
      LOGS_DIR: /app/logs
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./runtime:/app/runtime
      - ./logs:/app/logs
    working_dir: /app
    command: python app.py
